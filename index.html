<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Noshy Collection – Fresh Finds, Best Prices</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --dark: #0d0d0d;
    --dark2: #161616;
    --dark3: #1e1e1e;
    --cream: #f5f0e8;
    --white: #ffffff;
    --red: #e84040;
    --green: #2dcc70;
    --text-muted: #888;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* ── CUSTOM CURSOR ── */
  .cursor {
    width: 12px; height: 12px;
    background: var(--gold);
    border-radius: 50%;
    position: fixed; top:0; left:0;
    pointer-events: none;
    z-index: 9999;
    transition: transform .15s ease, background .2s;
    transform: translate(-50%,-50%);
  }
  .cursor-ring {
    width: 36px; height: 36px;
    border: 1.5px solid var(--gold);
    border-radius: 50%;
    position: fixed; top:0; left:0;
    pointer-events: none;
    z-index: 9998;
    transition: transform .35s ease, width .2s, height .2s, opacity .2s;
    transform: translate(-50%,-50%);
    opacity: .6;
  }
  a:hover ~ .cursor, button:hover ~ .cursor { transform: translate(-50%,-50%) scale(2); }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9000;
    opacity: .35;
  }

  /* ── NAVBAR ── */
  nav {
    position: fixed; top:0; left:0; right:0;
    z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 4rem;
    background: linear-gradient(to bottom, rgba(13,13,13,.95), transparent);
    backdrop-filter: blur(6px);
    transition: background .4s;
  }
  nav.scrolled { background: rgba(13,13,13,.96); }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 3px;
    color: var(--gold);
    text-decoration: none;
  }
  .nav-logo span { color: var(--white); }

  .nav-links { display:flex; gap:2.5rem; list-style:none; }
  .nav-links a {
    color: rgba(255,255,255,.75);
    text-decoration: none;
    font-size: .85rem;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: color .2s;
    position: relative;
  }
  .nav-links a::after {
    content:''; position:absolute; bottom:-4px; left:0; right:0;
    height:1px; background: var(--gold);
    transform: scaleX(0); transform-origin: left;
    transition: transform .3s;
  }
  .nav-links a:hover { color: var(--gold); }
  .nav-links a:hover::after { transform: scaleX(1); }

  .nav-cart-btn {
    background: var(--gold);
    color: var(--dark);
    border: none;
    padding: .6rem 1.4rem;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: .8rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: none;
    transition: background .2s, transform .2s;
    position: relative;
  }
  .nav-cart-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
  .cart-badge {
    position:absolute; top:-8px; right:-8px;
    background: var(--red);
    color: #fff;
    width:20px; height:20px;
    border-radius: 50%;
    font-size:.7rem;
    display:flex; align-items:center; justify-content:center;
    font-weight:700;
  }

  /* ── HERO ── */
  #hero {
    height: 100vh;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset:0;
    background:
      linear-gradient(135deg, rgba(13,13,13,.80) 35%, rgba(201,168,76,.10) 100%),
      url('https://images.unsplash.com/photo-1607082349566-187342175e2f?w=1800&q=85') center/cover no-repeat;
    transform: scale(1.05);
    animation: heroZoom 18s ease-in-out infinite alternate;
  }
  @keyframes heroZoom {
    from { transform: scale(1.05); }
    to   { transform: scale(1.12); }
  }
  .hero-content {
    position: relative; z-index:2;
    text-align: center;
    padding: 0 2rem;
    animation: fadeUp .9s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(40px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .hero-tag {
    display: inline-block;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-size: .7rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: .4rem 1.2rem;
    margin-bottom: 1.5rem;
    animation: fadeUp .9s .2s ease both;
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.5rem, 10vw, 8rem);
    font-weight: 900;
    line-height: .95;
    margin-bottom: 1.5rem;
    animation: fadeUp .9s .35s ease both;
  }
  .hero-title em { color: var(--gold); font-style: italic; }
  .hero-sub {
    font-size: 1.1rem;
    color: rgba(255,255,255,.65);
    font-weight: 300;
    margin-bottom: 3rem;
    letter-spacing: 1px;
    animation: fadeUp .9s .5s ease both;
  }
  .hero-btns {
    display: flex; gap:1rem; justify-content:center; flex-wrap:wrap;
    animation: fadeUp .9s .65s ease both;
  }
  .btn-primary {
    background: var(--gold);
    color: var(--dark);
    padding: 1rem 2.5rem;
    border: none;
    font-family:'DM Sans',sans-serif;
    font-weight:700;
    font-size:.9rem;
    letter-spacing:2px;
    text-transform:uppercase;
    cursor:none;
    text-decoration:none;
    transition: background .2s, transform .2s, box-shadow .2s;
    display:inline-block;
  }
  .btn-primary:hover {
    background: var(--gold-light);
    transform: translateY(-3px);
    box-shadow: 0 12px 35px rgba(201,168,76,.4);
  }
  .btn-outline {
    background: transparent;
    color: var(--white);
    padding: 1rem 2.5rem;
    border: 1px solid rgba(255,255,255,.4);
    font-family:'DM Sans',sans-serif;
    font-weight:500;
    font-size:.9rem;
    letter-spacing:2px;
    text-transform:uppercase;
    cursor:none;
    text-decoration:none;
    transition: border-color .2s, color .2s, transform .2s;
    display:inline-block;
  }
  .btn-outline:hover { border-color:var(--gold); color:var(--gold); transform:translateY(-3px); }

  .hero-scroll {
    position:absolute; bottom:2.5rem; left:50%;
    transform: translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:.5rem;
    color: rgba(255,255,255,.4);
    font-size:.7rem; letter-spacing:3px; text-transform:uppercase;
    animation: bounce 2s infinite;
    z-index:2;
  }
  .hero-scroll::after {
    content:'';
    width:1px; height:40px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    animation: lineGrow 2s infinite;
  }
  @keyframes bounce { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(8px)} }
  @keyframes lineGrow { 0%,100%{opacity:.5} 50%{opacity:1} }

  /* ── STATS BAR ── */
  .stats-bar {
    background: var(--gold);
    padding: 1.2rem 4rem;
    display:flex; justify-content:center; gap:4rem; flex-wrap:wrap;
  }
  .stat { text-align:center; }
  .stat-number {
    font-family:'Bebas Neue',sans-serif;
    font-size:2rem;
    color: var(--dark);
    line-height:1;
  }
  .stat-label {
    font-size:.7rem;
    color: rgba(13,13,13,.65);
    letter-spacing:2px;
    text-transform:uppercase;
    font-weight:500;
  }

  /* ── SECTION HEADERS ── */
  .section-header {
    text-align:center;
    padding: 5rem 2rem 3rem;
  }
  .section-eyebrow {
    font-size:.7rem; letter-spacing:5px; text-transform:uppercase;
    color: var(--gold); margin-bottom:1rem;
  }
  .section-title {
    font-family:'Playfair Display',serif;
    font-size:clamp(2rem,5vw,3.5rem);
    font-weight:700;
    line-height:1.1;
  }
  .section-title em { color:var(--gold); font-style:italic; }
  .section-line {
    width:60px; height:2px;
    background: linear-gradient(to right, var(--gold), transparent);
    margin: 1.5rem auto 0;
  }
